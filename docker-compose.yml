services:
  db:
    image: pgvector/pgvector:pg15
    container_name: yapat-postgres
    # Docker's default /dev/shm is 64MB, which Postgres uses for parallel-worker
    # DSM segments during sorts/hash joins. Large similarity-search queries over
    # bigger datasets exceed that and fail with "could not resize shared memory
    # segment ... No space left on device" (psycopg2.errors.DiskFull).
    shm_size: '1gb'
    environment:
      POSTGRES_USER: yapat_user
      POSTGRES_PASSWORD: yapat_password
      POSTGRES_DB: yapat
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yapat_user -d yapat"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: yapat-redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes
    restart: unless-stopped

  # FastAPI application
  api:
    build:
      context: .
      args:
        DEVICE: ${DEVICE:-cpu}
    container_name: yapat-api
    command: ["bash", "/app/startup.sh", "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://yapat_user:yapat_password@db/yapat
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-in-production}
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
      - API_STR=/api
      - PROJECT_NAME=YAPAT Backend
      - BACKEND_CORS_ORIGINS=${BACKEND_CORS_ORIGINS:-http://localhost:3000,http://localhost:8000}
      - DATA_ROOT=/data
      - OE_YAPAT_SERVICE_URL=http://host.docker.internal:8002
      - ACTIVE_LEARNING_MODELS_DIR=${ACTIVE_LEARNING_MODELS_DIR:-/app/models_AL}
      - AUTO_REGISTER_SPECIES_MODELS=${AUTO_REGISTER_SPECIES_MODELS:-true}
      - PAM_CHECKPOINTS_DIR=/app/models_AL/pam/checkpoints
      - PAM_DEFAULT_DEVICE=${PAM_DEFAULT_DEVICE:-cpu}
      - OE_YAPAT_TIMEOUT=120
    ports:
      - "8000:8000"
    volumes:
      - ${HOST_DATA_ROOT}:/data:ro
      - /data/bioacoustics:/data/monitora:ro
      # Mount host directory for species models (read-write so retraining can save checkpoints)
      - ${HOST_MODELS_AL:-./models_AL}:/app/models_AL
      - ${HOST_MODELS_AL:-./models_AL}:/app/assets/models/single_species_models:ro
    restart: unless-stopped

  # Celery worker for asynchronous task processing
  celery-worker:
    build:
      context: .
      args:
        DEVICE: ${DEVICE:-cpu}
    container_name: yapat-celery-worker
    # --max-tasks-per-child: without this, a fork-pool child process lives
    # forever and its memory footprint only ever grows (model loads, audio
    # decoding, TF/CUDA caching, etc. never get released). We've observed
    # this container's memory climbing to the 32G cgroup limit and getting
    # SIGKILL'd by the kernel OOM killer roughly every 15-20 minutes, all
    # day, killing whatever task happened to be running at that instant
    # (visible in Flower as a task silently getting redelivered with fresh
    # Received/Started timestamps and no error). Recycling a child after N
    # tasks bounds its memory growth and replaces it at a clean task
    # boundary instead of letting the kernel kill it mid-task.
    command: celery -A app.celery_app worker --loglevel=info --concurrency=2 --queues=default,embeddings,processing,exports --max-tasks-per-child=${CELERY_WORKER_MAX_TASKS_PER_CHILD:-100}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 32G
        reservations:
          memory: 1G
    environment:
      - DATABASE_URL=postgresql://yapat_user:yapat_password@db/yapat
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-in-production}
      - DATA_ROOT=/data
      - OE_YAPAT_SERVICE_URL=http://host.docker.internal:8002
      - ACTIVE_LEARNING_MODELS_DIR=${ACTIVE_LEARNING_MODELS_DIR:-/app/models_AL}
      - AUTO_REGISTER_SPECIES_MODELS=${AUTO_REGISTER_SPECIES_MODELS:-true}
      - PAM_CHECKPOINTS_DIR=/app/models_AL/pam/checkpoints
      - PAM_DEFAULT_DEVICE=${PAM_DEFAULT_DEVICE:-cpu}
      # App-wide Celery task time limits. Was previously not passed through at
      # all, so .env overrides on the server were silently ignored and every
      # task got config.py's hardcoded defaults (3600s/3300s) regardless of
      # what the operator set. Defaults here match those, so this is a no-op
      # unless explicitly overridden. Note: scan_dataset has its own longer,
      # per-task limit (see app/tasks/processing_tasks.py) since it can run
      # for hours on very large datasets — this pair governs every other task.
      - CELERY_TASK_TIME_LIMIT=${CELERY_TASK_TIME_LIMIT:-3600}
      - CELERY_TASK_SOFT_TIME_LIMIT=${CELERY_TASK_SOFT_TIME_LIMIT:-3300}
      # scan_dataset's own, longer time budget (see app/tasks/processing_tasks.py).
      # Only celery-worker runs the `processing` queue, so this only needs to
      # be set here. Defaults match the previous hardcoded values.
      - SCAN_TASK_TIME_LIMIT=${SCAN_TASK_TIME_LIMIT:-90000}
      - SCAN_TASK_SOFT_TIME_LIMIT=${SCAN_TASK_SOFT_TIME_LIMIT:-86400}
      # run_embedding's chord fan-out chunk size (see app/tasks/embedding_tasks.py).
      - EMBEDDING_CHORD_CHUNK_SIZE=${EMBEDDING_CHORD_CHUNK_SIZE:-25}
    volumes:
      - ${HOST_DATA_ROOT}:/data:ro
      - /data/bioacoustics:/data/monitora:ro
      # Read-write so Celery worker can save checkpoints when retraining
      - ${HOST_MODELS_AL:-./models_AL}:/app/models_AL
    restart: unless-stopped

  # Dedicated Celery worker for PAM Active Learning (training is CPU/GPU-intensive)
  celery-worker-pam-al:
    build:
      context: .
      args:
        DEVICE: ${DEVICE:-cpu}
    container_name: yapat-celery-worker-pam-al
    command: celery -A app.celery_app worker --loglevel=info --concurrency=2 --queues=pam_al -n pam_al@%h
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 16G
        reservations:
          memory: 8G
    environment:
      - DATABASE_URL=postgresql://yapat_user:yapat_password@db/yapat
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-in-production}
      - DATA_ROOT=/data
      - PAM_CHECKPOINTS_DIR=/app/models_AL/pam/checkpoints
      - PAM_DEFAULT_DEVICE=${PAM_DEFAULT_DEVICE:-cpu}
      - ACTIVE_LEARNING_MODELS_DIR=${ACTIVE_LEARNING_MODELS_DIR:-/app/models_AL}
    volumes:
      - ${HOST_DATA_ROOT}:/data:ro
      - /data/bioacoustics:/data/monitora:ro
      # Read-write: worker saves new checkpoint files here after retraining
      - ${HOST_MODELS_AL:-./models_AL}:/app/models_AL
    restart: unless-stopped

  # Celery beat scheduler for periodic tasks
  celery-beat:
    build:
      context: .
      args:
        DEVICE: ${DEVICE:-cpu}
    container_name: yapat-celery-beat
    command: celery -A app.celery_app beat --loglevel=info --scheduler=celery.beat:PersistentScheduler
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://yapat_user:yapat_password@db/yapat
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-secret-key-change-in-production}
      - DATA_ROOT=/data
      - OE_YAPAT_SERVICE_URL=http://host.docker.internal:8002
      - ACTIVE_LEARNING_MODELS_DIR=${ACTIVE_LEARNING_MODELS_DIR:-/app/models_AL}
      - AUTO_REGISTER_SPECIES_MODELS=${AUTO_REGISTER_SPECIES_MODELS:-true}
    volumes:
      - ${HOST_DATA_ROOT}:/data:ro
      - /data/bioacoustics:/data/monitora:ro
      - ${HOST_MODELS_AL:-./models_AL}:/app/models_AL
    restart: unless-stopped

  # Flower monitoring dashboard for Celery
  flower:
    build:
      context: .
      args:
        DEVICE: ${DEVICE:-cpu}
    container_name: yapat-flower
    command: celery -A app.celery_app flower --port=5555
    depends_on:
      redis:
        condition: service_healthy
      celery-worker:
        condition: service_started
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    ports:
      - "5555:5555"
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
