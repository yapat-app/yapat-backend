version: '3.8'

services:
  db:
    image: postgres:15
    container_name: yapat-postgres
    environment:
      POSTGRES_USER: yapat_user
      POSTGRES_PASSWORD: yapat_password
      POSTGRES_DB: yapat
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yapat_user"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

