services:
  db:
    image: pgvector/pgvector:pg15
    container_name: yapat-postgres
    environment:
      POSTGRES_USER: yapat_user
      POSTGRES_PASSWORD: yapat_password
      POSTGRES_DB: yapat
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yapat_user -d yapat"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: yapat-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes
    restart: unless-stopped

  # FastAPI application
  api:
    build: .
    container_name: yapat-api
    command: /app/startup.sh uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://yapat_user:yapat_password@db/yapat
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-in-production}
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
      - API_STR=/api
      - PROJECT_NAME=YAPAT Backend
      - BACKEND_CORS_ORIGINS=http://localhost:3000,http://localhost:8000
      - DATA_ROOT=/data
      - OE_YAPAT_SERVICE_URL=http://host.docker.internal:8002
      - ACTIVE_LEARNING_MODELS_DIR=${ACTIVE_LEARNING_MODELS_DIR:-/app/models_AL}
      - AUTO_REGISTER_SPECIES_MODELS=${AUTO_REGISTER_SPECIES_MODELS:-true}
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - ${HOST_DATA_ROOT}:/data:ro
      # Mount host directory for species models (read-write so retraining can save checkpoints)
      - ${HOST_MODELS_AL:-./models_AL}:/app/models_AL
      - /srv/DATA01/yapat/yapat-backend/models_AL:/app/assets/models/single_species_models:ro
    restart: unless-stopped

  # Celery worker for asynchronous task processing
  celery-worker:
    build: .
    container_name: yapat-celery-worker
    command: celery -A app.celery_app worker --loglevel=info --concurrency=2 --queues=default,embeddings,processing,exports
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 1G
    environment:
      - DATABASE_URL=postgresql://yapat_user:yapat_password@db/yapat
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-in-production}
      - DATA_ROOT=/data
      - OE_YAPAT_SERVICE_URL=http://host.docker.internal:8002
      - ACTIVE_LEARNING_MODELS_DIR=${ACTIVE_LEARNING_MODELS_DIR:-/app/models_AL}
      - AUTO_REGISTER_SPECIES_MODELS=${AUTO_REGISTER_SPECIES_MODELS:-true}
    volumes:
      - .:/app
      - ${HOST_DATA_ROOT}:/data:ro
      # Read-write so Celery worker can save checkpoints when retraining
      - ${HOST_MODELS_AL:-./models_AL}:/app/models_AL
    restart: unless-stopped

  # Celery beat scheduler for periodic tasks
  celery-beat:
    build: .
    container_name: yapat-celery-beat
    command: celery -A app.celery_app beat --loglevel=info --scheduler=celery.beat:PersistentScheduler
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://yapat_user:yapat_password@db/yapat
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-secret-key-change-in-production}
      - DATA_ROOT=/data
      - OE_YAPAT_SERVICE_URL=http://host.docker.internal:8002
      - ACTIVE_LEARNING_MODELS_DIR=${ACTIVE_LEARNING_MODELS_DIR:-/app/models_AL}
      - AUTO_REGISTER_SPECIES_MODELS=${AUTO_REGISTER_SPECIES_MODELS:-true}
    volumes:
      - .:/app
      - ${HOST_DATA_ROOT}:/data:ro
      - ${HOST_MODELS_AL:-./models_AL}:/app/models_AL
    restart: unless-stopped

  # Flower monitoring dashboard for Celery
  flower:
    build: .
    container_name: yapat-flower
    command: celery -A app.celery_app flower --port=5555
    depends_on:
      redis:
        condition: service_healthy
      celery-worker:
        condition: service_started
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    ports:
      - "5555:5555"
    volumes:
      - .:/app
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
