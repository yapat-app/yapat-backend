# GPU additions — included via COMPOSE_FILE in .env when DEVICE=gpu.
# See .env.example for usage.
#
# NVIDIA_VISIBLE_DEVICES=all is the reliable way to expose GPUs when using the
# nvidia container runtime. The deploy.resources.reservations approach is less
# reliable across Docker Engine versions.
#
# LD_LIBRARY_PATH for tensorflow CUDA libs is handled at image build time in the
# Dockerfile (written to /etc/ld.so.conf.d/nvidia-pip.conf + ldconfig). No
# hardcoded paths needed here.
services:
  api:
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]

  # BirdNET embedding worker — needs GPU for TF inference
  celery-worker:
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  celery-worker-pam-al:
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
