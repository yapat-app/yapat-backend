services:
  api:
    command: ["bash", "-c", "sed -i 's/\\r//' /app/startup.sh && bash /app/startup.sh uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"]
    volumes:
      - .:/app

  celery-worker:
    volumes:
      - .:/app

  celery-worker-pam-al:
    volumes:
      - .:/app

  celery-beat:
    volumes:
      - .:/app

  flower:
    volumes:
      - .:/app
