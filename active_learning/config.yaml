#Default values for active learning training
DEFAULT_EPOCHS : 20
DEFAULT_LEARNING_RATE : 1e-3
DEFAULT_BATCH_SIZE : 512
DEFAULT_HIDDEN_DIM : 128
DEFAULT_DROPOUT : 0.5

# Default values for active learning inference
DEFAULT_INFERENCE_THRESHOLD : 0.3
DEFAULT_DENSITY_K : 15
DEFAULT_COMPOSITE_WU : 0.5
DEFAULT_COMPOSITE_WD : 0.25
DEFAULT_COMPOSITE_WR : 0.25

# diversity() switches from exact brute-force (Flat) search to approximate
# HNSW search once the labelled set (Nl) exceeds this size. Below it, HNSW's
# graph-build overhead isn't worth it -- Flat is already fast at small Nl.
# Placeholder pending a benchmark rerun (see paper Fig. 5d / Section 2.6);
# not yet tuned against measured error rate or timing.
DIVERSITY_HNSW_MIN_NL : 500

# diversity() switches from exact brute-force (Flat) search to approximate
# HNSW search once the labelled set (Nl) exceeds this size. Below it, HNSW's
# graph-build overhead isn't worth it -- Flat is already fast at small Nl.
# Placeholder pending a benchmark rerun (see paper Fig. 5d / Section 2.6);
# not yet tuned against measured error rate or timing.
DIVERSITY_HNSW_MIN_NL : 500

RETRAIN_AFTER : 100

# Reserved sentinel labels for confirmed-negative snippets -- match the
# frontend quick-label modal's slug convention (display text -> taxon_id
# "local:<slug>"), e.g. "No biophony" (no biological sound at all) and
# "Other biophony" (a biological sound is present, but not one of the
# target species -- still a genuine negative for every target class). Add
# more entries here as needed. All are excluded from the trainable label
# space everywhere species_list/species_candidates are built from
# annotations; snippets carrying only one (or more) of these labels are
# trained as explicit all-zero (confirmed-negative) rows instead of a class
# of their own, so confidence/composite/label_scope never see any of them
# as a species. The first entry is the canonical label used when
# persisting a collapsed confirmed-negative GROUND_TRUTH annotation row
# (see store_snippet_annotations).
NO_EVENT_LABELS :
  - "local:no_biophony"
  - "local:other_biophony"