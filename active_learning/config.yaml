#Default values for active learning training
DEFAULT_EPOCHS : 20
DEFAULT_LEARNING_RATE : 1e-3
DEFAULT_BATCH_SIZE : 512
DEFAULT_HIDDEN_DIM : 128
DEFAULT_DROPOUT : 0.5

# Default values for active learning inference
DEFAULT_INFERENCE_THRESHOLD : 0.3
DEFAULT_DENSITY_K : 15
DEFAULT_COMPOSITE_WU : 0.5
DEFAULT_COMPOSITE_WD : 0.25
DEFAULT_COMPOSITE_WR : 0.25

# diversity() switches from exact brute-force (Flat) search to approximate
# HNSW search once the labelled set (Nl) exceeds this size. Below it, HNSW's
# graph-build overhead isn't worth it -- Flat is already fast at small Nl.
# Placeholder pending a benchmark rerun (see paper Fig. 5d / Section 2.6);
# not yet tuned against measured error rate or timing.
DIVERSITY_HNSW_MIN_NL : 500

RETRAIN_AFTER : 100

# CONSTANTS
NO_EVENT_LABEL : "None"

